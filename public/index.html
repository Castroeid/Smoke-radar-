<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Smoke Radar</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #06080d;
      color: #f3f5f7;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 24px;
    }

    .hero {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 20px;
      margin-bottom: 28px;
      flex-wrap: wrap;
    }

    h1 {
      margin: 0;
      font-size: 54px;
      color: #ff6b2c;
      letter-spacing: 1px;
    }

    .sub {
      color: #aab2c3;
      margin-top: 8px;
    }

    button {
      padding: 14px 22px;
      background: linear-gradient(135deg, #ff6b2c, #ff8b57);
      border: none;
      border-radius: 12px;
      color: white;
      font-size: 17px;
      cursor: pointer;
      font-weight: bold;
    }

    #status {
      margin-bottom: 20px;
      color: #ffcfbb;
      min-height: 24px;
    }

    .kpis {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
      gap: 14px;
      margin-bottom: 22px;
    }

    .kpi {
      background: linear-gradient(180deg, #0f141d, #0b1017);
      border: 1px solid #1c2432;
      border-radius: 18px;
      padding: 18px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.25);
    }

    .kpi-title {
      color: #94a0b8;
      font-size: 13px;
      margin-bottom: 8px;
    }

    .kpi-value {
      font-size: 28px;
      color: #ffffff;
      font-weight: bold;
    }

    .section-grid {
      display: grid;
      grid-template-columns: 2fr 1.1fr;
      gap: 18px;
      margin-bottom: 24px;
    }

    .panel {
      background: #0d121a;
      border: 1px solid #1a2230;
      border-radius: 18px;
      padding: 18px;
      box-shadow: 0 8px 28px rgba(0,0,0,0.25);
    }

    .panel h2 {
      margin-top: 0;
      font-size: 22px;
      color: #ff8b57;
    }

    .keywords {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .keyword {
      background: #131b27;
      border: 1px solid #263245;
      color: #dbe3ef;
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 13px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }

    th, td {
      padding: 10px;
      border-bottom: 1px solid #1c2432;
      text-align: right;
    }

    th {
      color: #9eabc3;
      font-weight: 600;
    }

    .video-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 18px;
      margin-top: 24px;
    }

    .card {
      background: #0d121a;
      border: 1px solid #1b2432;
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 8px 24px rgba(0,0,0,0.22);
    }

    .card img {
      width: 100%;
      display: block;
      aspect-ratio: 16 / 9;
      object-fit: cover;
    }

    .card-body {
      padding: 14px;
    }

    .title {
      font-size: 18px;
      line-height: 1.45;
      margin-bottom: 8px;
    }

    .channel {
      color: #99a7bf;
      margin-bottom: 12px;
      font-size: 14px;
    }

    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 12px;
    }

    .stat {
      background: #131a24;
      border: 1px solid #202a3a;
      border-radius: 12px;
      padding: 10px;
    }

    .stat small {
      display: block;
      color: #97a3ba;
      margin-bottom: 4px;
    }

    .stat strong {
      font-size: 18px;
    }

    .watch-link {
      display: inline-block;
      margin-top: 6px;
      background: linear-gradient(135deg, #ff6b2c, #ff8b57);
      color: white;
      text-decoration: none;
      padding: 10px 14px;
      border-radius: 10px;
      font-weight: bold;
    }

    canvas {
      max-height: 340px;
    }

    @media (max-width: 980px) {
      .section-grid {
        grid-template-columns: 1fr;
      }

      h1 {
        font-size: 40px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="hero">
      <div>
        <h1>Smoke Radar 🥩</h1>
        <div class="sub">Live meat content intelligence dashboard</div>
      </div>
      <button id="loadBtn" onclick="loadData()">רענן רדאר</button>
    </div>

    <div id="status"></div>

    <div class="kpis" id="kpis"></div>

    <div class="section-grid">
      <div class="panel">
        <h2>Top Smoke Score</h2>
        <canvas id="scoreChart"></canvas>
      </div>

      <div class="panel">
        <h2>Hot Keywords</h2>
        <div class="keywords" id="keywords"></div>
      </div>
    </div>

    <div class="section-grid">
      <div class="panel">
        <h2>Channel Comparison</h2>
        <canvas id="channelChart"></canvas>
      </div>

      <div class="panel">
        <h2>Top Channels</h2>
        <table>
          <thead>
            <tr>
              <th>ערוץ</th>
              <th>וידאו</th>
              <th>צפיות</th>
              <th>Smoke</th>
            </tr>
          </thead>
          <tbody id="channelTable"></tbody>
        </table>
      </div>
    </div>

    <div class="panel">
      <h2>Radar Feed</h2>
      <div class="video-grid" id="results"></div>
    </div>
  </div>

  <script>
    let scoreChartInstance = null;
    let channelChartInstance = null;

    function formatNum(n) {
      return Number(n || 0).toLocaleString("en-US");
    }

    function escapeHtml(str) {
      return String(str || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    async function loadData() {
      const button = document.getElementById("loadBtn");
      const status = document.getElementById("status");
      const results = document.getElementById("results");

      button.disabled = true;
      status.textContent = "טוען את הרדאר...";
      results.innerHTML = "";

      try {
        const res = await fetch("/api/smoke-radar");
        const data = await res.json();

        if (!res.ok) {
          throw new Error(data.details || data.error || "Unknown error");
        }

        renderKpis(data.summary);
        renderKeywords(data.topKeywords || []);
        renderChannelTable(data.topChannels || []);
        renderVideos(data.videos || []);
        renderScoreChart(data.chartData || []);
        renderChannelChart(data.topChannels || []);

        status.textContent = `נטענו ${data.total} סרטונים מהרדאר`;
      } catch (error) {
        console.error(error);
        status.textContent = "שגיאה בטעינת הנתונים";
        results.innerHTML = `<div>${escapeHtml(error.message)}</div>`;
      } finally {
        button.disabled = false;
      }
    }

    function renderKpis(summary = {}) {
      document.getElementById("kpis").innerHTML = `
        <div class="kpi">
          <div class="kpi-title">Total Views</div>
          <div class="kpi-value">${formatNum(summary.totalViews)}</div>
        </div>
        <div class="kpi">
          <div class="kpi-title">Avg Views</div>
          <div class="kpi-value">${formatNum(summary.avgViews)}</div>
        </div>
        <div class="kpi">
          <div class="kpi-title">Avg Likes</div>
          <div class="kpi-value">${formatNum(summary.avgLikes)}</div>
        </div>
        <div class="kpi">
          <div class="kpi-title">Avg Smoke Score</div>
          <div class="kpi-value">${formatNum(summary.avgSmokeScore)}</div>
        </div>
      `;
    }

    function renderKeywords(keywords) {
      document.getElementById("keywords").innerHTML = keywords.map(k =>
        `<span class="keyword">${escapeHtml(k.keyword)} · ${k.count}</span>`
      ).join("");
    }

    function renderChannelTable(channels) {
      document.getElementById("channelTable").innerHTML = channels.map(ch => `
        <tr>
          <td>${escapeHtml(ch.channelTitle)}</td>
          <td>${formatNum(ch.videos)}</td>
          <td>${formatNum(ch.totalViews)}</td>
          <td>${formatNum(ch.avgSmokeScore)}</td>
        </tr>
      `).join("");
    }

    function renderVideos(videos) {
      document.getElementById("results").innerHTML = videos.map(v => `
        <div class="card">
          <img src="${v.thumbnail}" alt="${escapeHtml(v.title)}">
          <div class="card-body">
            <div class="title">${escapeHtml(v.title)}</div>
            <div class="channel">${escapeHtml(v.channelTitle)}</div>

            <div class="stats">
              <div class="stat">
                <small>Views</small>
                <strong>${formatNum(v.viewCount)}</strong>
              </div>
              <div class="stat">
                <small>Likes</small>
                <strong>${formatNum(v.likeCount)}</strong>
              </div>
              <div class="stat">
                <small>Smoke Score</small>
                <strong>${formatNum(v.smokeScore)}</strong>
              </div>
              <div class="stat">
                <small>Views / Hour</small>
                <strong>${formatNum(v.viewsPerHour)}</strong>
              </div>
            </div>

            <a class="watch-link" href="https://youtube.com/watch?v=${v.id}" target="_blank" rel="noopener noreferrer">צפייה ▶</a>
          </div>
        </div>
      `).join("");
    }

    function renderScoreChart(chartData) {
      const ctx = document.getElementById("scoreChart").getContext("2d");

      if (scoreChartInstance) scoreChartInstance.destroy();

      scoreChartInstance = new Chart(ctx, {
        type: "bar",
        data: {
          labels: chartData.map(x => x.title),
          datasets: [{
            label: "Smoke Score",
            data: chartData.map(x => x.smokeScore)
          }]
        },
        options: {
          responsive: true,
          plugins: {
            legend: { labels: { color: "#fff" } }
          },
          scales: {
            x: {
              ticks: { color: "#b5c0d4" }
            },
            y: {
              ticks: { color: "#b5c0d4" }
            }
          }
        }
      });
    }

    function renderChannelChart(channels) {
      const ctx = document.getElementById("channelChart").getContext("2d");

      if (channelChartInstance) channelChartInstance.destroy();

      channelChartInstance = new Chart(ctx, {
        type: "radar",
        data: {
          labels: channels.map(c => c.channelTitle.length > 16 ? c.channelTitle.slice(0, 16) + "..." : c.channelTitle),
          datasets: [{
            label: "Avg Smoke Score",
            data: channels.map(c => c.avgSmokeScore)
          }]
        },
        options: {
          responsive: true,
          plugins: {
            legend: { labels: { color: "#fff" } }
          },
          scales: {
            r: {
              angleLines: { color: "#2c3647" },
              grid: { color: "#2c3647" },
              pointLabels: { color: "#c7d1e0" },
              ticks: { color: "#c7d1e0", backdropColor: "transparent" }
            }
          }
        }
      });
    }

    loadData();
  </script>
</body>
</html>
