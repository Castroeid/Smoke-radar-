<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Smoke Radar App</title>
  <meta name="theme-color" content="#080b10" />
  <link rel="manifest" href="/app/manifest.json" />
  <link rel="stylesheet" href="/app/app.css" />
</head>
<body>
  <div id="openingSplash" class="opening-splash" aria-hidden="true">
    <div class="opening-splash-overlay"></div>
    <div class="opening-splash-content">
      <div class="opening-logo">🔥 Smoke Radar</div>
      <div class="opening-radar-loader" aria-hidden="true">
        <span></span>
      </div>
      <p id="openingMessage" class="opening-message"></p>
      <ol id="openingSteps" class="opening-steps"></ol>
      <div class="opening-progress" aria-hidden="true">
        <span id="openingProgressFill" class="opening-progress-fill"></span>
      </div>
    </div>
  </div>

  <main id="app" class="app-shell" data-step="landing">
    <header id="appHeader" class="app-header">
      <p class="brand">🔥 Smoke Radar</p>
      <h1 id="screenTitle"></h1>
      <p id="screenSubtitle" class="hero-subtitle"></p>
      <div class="progress-wrap" aria-hidden="true">
        <span id="progressText" class="progress-text"></span>
        <div class="progress-track">
          <span id="progressFill" class="progress-fill"></span>
        </div>
      </div>
    </header>

    <section id="screenContent" class="screen-content"></section>

    <nav class="app-nav">
      <button id="backBtn" class="btn btn-ghost" type="button"></button>
      <button id="nextBtn" class="btn btn-primary" type="button"></button>
    </nav>
  </main>
  <div id="appToast" class="app-toast" role="status" aria-live="polite"></div>

  <script src="/app/app.js" defer></script>
</body>
</html>
